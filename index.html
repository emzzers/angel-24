let _ac = null;
function aC() { if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)(); return _ac; }
function tone({freq=440,type='sine',gain=0.15,start=0,dur=0.2,freqEnd}){
  try{ const c=aC(),o=c.createOscillator(),g=c.createGain();
    o.connect(g);g.connect(c.destination);o.type=type;
    o.frequency.setValueAtTime(freq,c.currentTime+start);
    if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,c.currentTime+start+dur);
    g.gain.setValueAtTime(gain,c.currentTime+start);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+start+dur);
    o.start(c.currentTime+start);o.stop(c.currentTime+start+dur); }catch{}
}

/* Interstellar ambient BGM */
let _bgm=false;
function startBGM(){
  if(_bgm)return;_bgm=true;
  try{
    const ctx=aC();
    const master=ctx.createGain();
    master.gain.setValueAtTime(0,ctx.currentTime);
    master.gain.linearRampToValueAtTime(0.062,ctx.currentTime+9);
    master.connect(ctx.destination);
    const b=ctx.createOscillator(),bg=ctx.createGain();
    b.type='sine';b.frequency.value=65.41;
    bg.gain.setValueAtTime(0,ctx.currentTime);
    bg.gain.linearRampToValueAtTime(0.09,ctx.currentTime+9);
    b.connect(bg);bg.connect(master);b.start(ctx.currentTime);
    const CHORDS=[[130.81,155.56,196],[103.83,130.81,155.56],[155.56,196,233.08],[116.54,146.83,174.61]];
    const CD=12;
    function organ(freqs,t){
      freqs.forEach(f=>{[1,2,3].forEach((h,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.type='sine';o.frequency.value=f*h;
        const v=[0.34,0.17,0.08][i]/freqs.length;
        g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(v,t+2.5);
        g.gain.setValueAtTime(v,t+CD-2);g.gain.linearRampToValueAtTime(0,t+CD+0.6);
        o.connect(g);g.connect(master);o.start(t);o.stop(t+CD+0.8);
      });});
    }
    let nxt=ctx.currentTime+0.4;
    function schedule(){
      CHORDS.forEach((c,i)=>organ(c,nxt+i*CD));
      nxt+=CHORDS.length*CD;
      setTimeout(schedule,(CHORDS.length*CD-4)*1000);
    }
    schedule();
  }catch(e){}
}

function Terminal({onSuccess}){
  const [lineIdx,setLineIdx]=useState(0);
  const [charIdx,setCharIdx]=useState(0);
  const [lines,setLines]=useState(BOOT_LINES.map(()=>''));

  const [bgFlash,setBgFlash]=useState(false);
  const inputRef=useRef(null);
  const prevChar=useRef(-1);

  useEffect(()=>{
    if(lineIdx>=BOOT_LINES.length){setTypingDone(true);return;}
    const L=BOOT_LINES[lineIdx];
    if(charIdx<L.text.length){
      const t=setTimeout(()=>{
        setLines(p=>{const n=[...p];n[lineIdx]=L.text.slice(0,charIdx+1);return n;});
        if(charIdx!==prevChar.current){playClick();prevChar.current=charIdx;}
        setCharIdx(c=>c+1);
      },charIdx===0?350:L.delay);
      return()=>clearTimeout(t);
    }else{
      const t=setTimeout(()=>{setLineIdx(l=>l+1);setCharIdx(0);prevChar.current=-1;},220);
      return()=>clearTimeout(t);
    }
  },[lineIdx,charIdx]);

  useEffect(()=>{if(typingDone)setTimeout(()=>inputRef.current?.focus(),100);},[typingDone]);

  const handleSubmit=(e)=>{

        {BOOT_LINES.map((L,i)=>(

            {lines[i]}
            {i===lineIdx&&charIdx<L.text.length&&<span className="blink">█</span>}
          </div>
        ))}
        <AnimatePresence>
          {status==='denied'&&<motion.div key="d" initial={{opacity:0,x:-10}} animate={{opacity:1,x:0}} exit={{opacity:0}} className="text-base" style={R}>
            {`> ДОСТУП ЗАПРЕЩЁН. ПОПЫТКА ЗАФИКСИРОВАНА. [${attempts+1}]`}
          </motion.div>}
          {status==='granted'&&<motion.div key="g" initial={{opacity:0}} animate={{opacity:1}} className="text-base" style={{...G,textShadow:'0 0 10px rgba(0,255,65,.9)'}}>
            {'> ДОСТУП РАЗРЕШЁН. ЛИЧНОСТЬ ПОДТВЕРЖДЕНА. ДОБРО ПОЖАЛОВАТЬ, ОПЕРАТИВНИК.'}
          </motion.div>}
        </AnimatePresence>
        {typingDone&&status!=='granted'&&(

            initial={{opacity:0}} animate={{opacity:1}} transition={{duration:.3}}>

  const [cards]=useState(()=>shuffle([

    const nf=[...flipped,idx];

      setDisabled(true);

      const [i1,i2]=nf;
      const c1=cards[i1],c2=cards[i2];
      if(c1.pairId===c2.pairId&&c1.type!==c2.type){
        playBeep();

          const nm=new Set([...matched,c1.pairId]);
          setMatched(nm);setFlipped([]);setDisabled(false);
          if(nm.size===10){playSuccess();setTimeout(()=>{setSuccess(true);setTimeout(()=>setShowBtn(true),1200);},400);}

          initial={{opacity:0,y:12}} animate={{opacity:1,y:0}} transition={{delay:.4}}>
          <div className="text-base tracking-widest mb-4"
            style={{color:'#00FF41',textShadow:'0 0 12px rgba(0,255,65,.9)'}}>
            ✓ СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА — ВСЕ 10 ПАР НАЙДЕНЫ
          </div>
          {showBtn&&<motion.button onClick={onNext}
            className="px-12 py-3 text-base tracking-widest uppercase"
            style={{border:'1px solid #00FF41',color:'#00FF41',textShadow:'0 0 8px rgba(0,255,65,.6)',boxShadow:'0 0 16px rgba(0,255,65,.22)'}}

const SCRAMBLE_CHARS='!@#$%^&*<>?/|[]{}АБВГДЕЁЖЗИЙКЛМН0123456789#@!%$&*><';

function WishesGrid({onNext}){
  const [unlocked,setUnlocked]=useState(new Set());
  const [decrypting,setDecrypting]=useState(new Set());
  const [scrambled,setScrambled]=useState({});
  const [showBtn,setShowBtn]=useState(false);
  const timers=useRef({});

  useEffect(()=>()=>Object.values(timers.current).forEach(clearInterval),[]);

    if(unlocked.has(dir.id)||decrypting.has(dir.id))return;
    playDecrypt();

    const iv=setInterval(()=>{
      elapsed+=75;
      const prog=Math.min(elapsed/1500,1);
      const reveal=Math.floor(prog*dir.text.length);
      const rest=Array.from({length:dir.text.length-reveal},()=>
        SCRAMBLE_CHARS[Math.floor(Math.random()*SCRAMBLE_CHARS.length)]).join('');
      setScrambled(p=>({...p,[dir.id]:dir.text.slice(0,reveal)+rest}));
      if(elapsed>=1500){
        clearInterval(iv);
        setScrambled(p=>({...p,[dir.id]:dir.text}));
        setDecrypting(p=>{const n=new Set(p);n.delete(dir.id);return n;});
        setUnlocked(p=>{
          const n=new Set([...p,dir.id]);
          if(n.size===24)setTimeout(()=>setShowBtn(true),700);
          return n;

const MAP_W=1200,MAP_H=580;

function WorldMap({onNext}){
  const [countryPaths,setCountryPaths]=useState([]);
  const [gratPath,setGratPath]=useState('');
  const [cityPos,setCityPos]=useState({});
  const [confirmed,setConfirmed]=useState(0);
  const [activePopup,setActivePopup]=useState(null);
  const [errorFlash,setErrorFlash]=useState(false);
  const [showBtn,setShowBtn]=useState(false);

  useEffect(()=>{
    const d3=window.d3,topo=window.topojson;
    if(!d3||!topo)return;
    const proj=d3.geoNaturalEarth1().scale(188).translate([MAP_W/2,MAP_H/2+18]);
    const path=d3.geoPath().projection(proj);
    const pos={};
    LOCATIONS.forEach(l=>{const pt=proj([l.lon,l.lat]);if(pt)pos[l.id]={x:pt[0],y:pt[1]};});
    setCityPos(pos);
    try{setGratPath(path(d3.geoGraticule()()));}catch(e){}
    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
      .then(r=>r.json()).then(world=>{
        const feats=topo.feature(world,world.objects.countries).features;
        setCountryPaths(feats.map((f,i)=>({id:f.id??i,d:path(f)||''})).filter(p=>p.d));
      }).catch(()=>{});

══════════════════════════════════════════════ */
function AudioPlayer(){
  const audioRef=useRef(null);
  const canvasRef=useRef(null);
  const analyserRef=useRef(null);
  const animRef=useRef(null);
  const initDone=useRef(false);
  const [playing,setPlaying]=useState(false);
  const tRef=useRef(0);

  /* Инициализация Web Audio + анализатор */
  const initAudio=()=>{
    if(initDone.current)return;
    initDone.current=true;
    const ctx=aC();
    const analyser=ctx.createAnalyser();
    analyser.fftSize=512;
    analyserRef.current=analyser;
    const src=ctx.createMediaElementSource(audioRef.current);
    src.connect(analyser);
    analyser.connect(ctx.destination);
  };

  /* Отрисовка осциллограммы */
  const drawLoop=()=>{
    animRef.current=requestAnimationFrame(drawLoop);
    const canvas=canvasRef.current;
    if(!canvas)return;
    const c=canvas.getContext('2d');
    const W=canvas.width,H=canvas.height;
    c.fillStyle='#030803';
    c.fillRect(0,0,W,H);

    if(analyserRef.current&&playing){
      /* Реальная осциллограмма */
      const buf=new Uint8Array(analyserRef.current.frequencyBinCount);
      analyserRef.current.getByteTimeDomainData(buf);
      c.strokeStyle='#00FF41';
      c.lineWidth=1.8;
      c.shadowColor='rgba(0,255,65,.75)';
      c.shadowBlur=8;
      c.beginPath();
      for(let i=0;i<buf.length;i++){
        const x=(i/buf.length)*W;
        const y=(buf[i]/128)*H/2;
        i===0?c.moveTo(x,y):c.lineTo(x,y);
      }
      c.stroke();
    }else{
      /* Idle: медленная синусоида */
      tRef.current+=0.018;
      c.strokeStyle='rgba(0,255,65,.28)';
      c.lineWidth=1.5;
      c.shadowColor='rgba(0,255,65,.2)';
      c.shadowBlur=4;
      c.beginPath();
      for(let x=0;x<=W;x+=2){
        const y=H/2+Math.sin((x/W)*Math.PI*8+tRef.current)*4;
        x===0?c.moveTo(x,y):c.lineTo(x,y);
      }
      c.stroke();
    }
    /* Горизонтальная ось */
    c.strokeStyle='rgba(0,255,65,.08)';
    c.lineWidth=1;
    c.shadowBlur=0;
    c.beginPath();c.moveTo(0,H/2);c.lineTo(W,H/2);c.stroke();
  };

  useEffect(()=>{
    drawLoop();
    return()=>cancelAnimationFrame(animRef.current);
  },[playing]);

  const toggle=()=>{
    initAudio();
    aC().resume();
    if(playing){
      audioRef.current.pause();
      setPlaying(false);
    }else{
      audioRef.current.play();
      setPlaying(true);
    }
  };

  return(
    <motion.div className="w-full max-w-lg mt-4 z-10"
      initial={{opacity:0,y:30}} animate={{opacity:1,y:0}}
      transition={{delay:2.6,duration:.9}}>
      <audio ref={audioRef} src="voice_message.mp3" onEnded={()=>setPlaying(false)} preload="auto"/>

      {/* Заголовок */}
      <div className="text-xs tracking-[.25em] mb-2 text-center select-none"
        style={{color:'rgba(0,255,65,.38)'}}>
        ◈ ГОЛОСОВОЕ ПОСЛАНИЕ // ВХОДЯЩИЙ СИГНАЛ ◈
      </div>

      {/* Осциллограф */}
      <div className="relative" style={{
        border:'1px solid rgba(0,255,65,.28)',
        background:'#030803',
        padding:'6px 8px',
        boxShadow:'inset 0 0 24px rgba(0,0,0,.6), 0 0 14px rgba(0,255,65,.07)',
      }}>
        <canvas ref={canvasRef} width={500} height={72} style={{width:'100%',display:'block'}}/>
        {/* Угловые скобки */}
        {[['top-1 left-1','border-t border-l'],['top-1 right-1','border-t border-r'],
          ['bottom-1 left-1','border-b border-l'],['bottom-1 right-1','border-b border-r']].map(([p,b],i)=>(
          <div key={i} className={`absolute w-3 h-3 ${p} ${b}`}
            style={{borderColor:'rgba(0,255,65,.45)'}}/>
        ))}
        {/* Live метка */}
        {playing&&(
          <motion.div className="absolute top-2 right-5 text-xs select-none"
            style={{color:'#FF3131',fontFamily:"'JetBrains Mono',monospace",letterSpacing:'2px'}}
            animate={{opacity:[1,0,1]}} transition={{duration:.8,repeat:Infinity}}>
            ● REC
          </motion.div>
        )}
      </div>

      {/* Кнопка воспроизведения */}
      <motion.button onClick={toggle}
        className="w-full mt-2 py-3 text-sm tracking-widest uppercase"
        style={{
          border:`1px solid ${playing?'rgba(0,255,65,.85)':'rgba(0,255,65,.45)'}`,
          color:'#00FF41',background:'transparent',
          fontFamily:"'JetBrains Mono',monospace",
          textShadow:'0 0 8px rgba(0,255,65,.55)',
          cursor:'pointer',
          transition:'border-color .3s',
        }}
        whileHover={{backgroundColor:'rgba(0,255,65,.07)'}}
        animate={playing?{boxShadow:['0 0 8px rgba(0,255,65,.15)','0 0 22px rgba(0,255,65,.45)','0 0 8px rgba(0,255,65,.15)']}:{boxShadow:'0 0 8px rgba(0,255,65,.1)'}}
        transition={{duration:1.2,repeat:Infinity}}>
        {playing?'⏸  ПАУЗА':'▶  ПРОСЛУШАТЬ СЕКРЕТНОЕ ПОСЛАНИЕ'}
      </motion.button>
    </motion.div>
  );
}

            ▶ АКТИВИРОВАТЬ ФИНАЛЬНЫЙ ПРОТОКОЛ
          </motion.button>
          <div className="text-base tracking-widest" style={{color:'rgba(0,255,65,.2)'}}>
            — ВНИМАНИЕ: ДЕЙСТВИЕ НЕОБРАТИМО —
          </div>
        </motion.div>
      )}

      {phase==='countdown'&&(
        <motion.div className="flex flex-col items-center gap-5"
          initial={{opacity:0}} animate={{opacity:1}}>
          <div className="text-lg tracking-[.4em]" style={{color:'rgba(255,49,49,.72)'}}>
            ФИНАЛЬНАЯ ПОСЛЕДОВАТЕЛЬНОСТЬ ЗАПУЩЕНА
          </div>
          <AnimatePresence mode="wait">
            <motion.div key={count} className="font-bold"
              style={{fontSize:'clamp(8rem,25vw,18rem)',...R,
                fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}
              initial={{scale:1.5,opacity:0}} animate={{scale:1,opacity:1}}
              exit={{scale:.65,opacity:0}} transition={{duration:.28}}>
              {String(count).padStart(2,'0')}
            </motion.div>
          </AnimatePresence>
          <div className="flex gap-2 mt-2">
            {Array.from({length:5},(_,i)=>(
              <motion.div key={i} className="w-4 h-8 rounded-sm"
                style={{backgroundColor:i<5-count?'#FF3131':'rgba(255,49,49,.15)'}}
                animate={i<5-count?{opacity:[.7,1,.7]}:{}} transition={{duration:.5,repeat:Infinity}}/>
            ))}
          </div>
        </motion.div>
      )}

      {phase==='card'&&(
        <>
          <Confetti/>
          <motion.div className="flex flex-col items-center gap-6 z-10"
            initial={{opacity:0}} animate={{opacity:1}} transition={{duration:.7}}>
            <motion.div className="text-base tracking-[.35em] text-center"
              style={{color:'#00FF41',textShadow:'0 0 9px rgba(0,255,65,.75)'}}
              animate={{opacity:[.6,1,.6]}} transition={{duration:2,repeat:Infinity}}>
              ✓ АНАЛИЗ ЗАВЕРШЁН — ИДЕАЛЬНАЯ ЖЕНЩИНА ОБНАРУЖЕНА
            </motion.div>
            <AccessCard/>
            <motion.div className="max-w-xl text-center space-y-3 mt-2"
              initial={{opacity:0,y:22}} animate={{opacity:1,y:0}} transition={{delay:1.3,duration:.65}}>
              <div className="text-base leading-relaxed"
                style={{color:'#00FF41',textShadow:'0 0 8px rgba(0,255,65,.5)'}}>
                Система завершила анализ. Идеальная женщина обнаружена.
              </div>
              <motion.div className="text-xl font-bold mt-2 tracking-wide"
                style={{color:'#00FF41',textShadow:'0 0 16px rgba(0,255,65,.95)'}}
                animate={{opacity:[.8,1,.8]}} transition={{duration:1.5,repeat:Infinity}}>
                С Днём Рождения, любимая! 🎂
              </motion.div>
              <div className="text-base mt-1" style={{color:'rgba(0,255,65,.72)'}}>
                Оглянись — цветы, практики и я уже здесь 🌸🎁
              </div>
            </motion.div>
            <motion.div className="text-sm tracking-widest mt-1 select-none"
              style={{color:'rgba(0,255,65,.18)'}}
              animate={{opacity:[.18,.45,.18]}} transition={{duration:3,repeat:Infinity}}>
              01001000 01000001 01010000 01010000 01011001 00100000 01000010 01001001 01010010 01010100 01001000 01000100 01000001 01011001
            </motion.div>
            <AudioPlayer/>
          </motion.div>
        </>
      )}

      <div className="fixed bottom-5 left-0 right-0 flex justify-between px-8 text-sm"
        style={{color:'rgba(0,255,65,.15)'}}>
        <span>МОДУЛЬ: ФИНАЛЬНЫЙ ПРОТОКОЛ</span>
        <span>ANGEL 24 // КОНЕЦ ПЕРЕДАЧИ</span>
      </div>
    </motion.div>
  );
}

/* ══════════════════════════════════════════════
   КОРНЕВОЕ ПРИЛОЖЕНИЕ
══════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState('terminal');
  const [glitching,setGlitching]=useState(false);
  const advance=useCallback(next=>{
    setGlitching(true);
    setTimeout(()=>{setScreen(next);setGlitching(false);},520);
  },[]);
  return(
    <div className="relative w-screen h-screen overflow-hidden"
      style={{background:'#050505',fontFamily:"'JetBrains Mono',monospace"}}>
      <GlobalEffects glitching={glitching}/>
      <AnimatePresence mode="wait">
        {screen==='terminal'&&<Terminal    key="terminal"  onSuccess={()=>advance('dossier')}/>}
        {screen==='dossier' &&<Dossier     key="dossier"   onNext={()=>advance('memory')}/>}
        {screen==='memory'  &&<MemoryGame  key="memory"    onNext={()=>advance('wishes')}/>}
        {screen==='wishes'  &&<WishesGrid  key="wishes"    onNext={()=>advance('worldmap')}/>}
        {screen==='worldmap'&&<WorldMap    key="worldmap"  onNext={()=>advance('finale')}/>}
        {screen==='finale'  &&<GrandFinale key="finale"/>}
      </AnimatePresence>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
